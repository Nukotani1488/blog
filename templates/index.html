{% extends "base.html" %}

{% block title %}nukotani{% endblock %}

{% block content %}
<main class="max-w-2xl mx-auto px-6 py-16">

    <header class="mb-16">
        <h1 class="text-2xl font-medium mb-2">nukotani</h1>
        <p class="text-gray-500 text-sm">notes on rust, linux, and whatever else.</p>
    </header>

    <section>
        {% for post in posts %}
        <a href="/posts/{{ post.id }}" class="block group py-5 border-t border-gray-100 hover:bg-gray-50 -mx-4 px-4 transition-colors">
            <div class="flex items-baseline justify-between gap-4">
                <h2 class="text-base font-medium text-gray-900 group-hover:text-black">{{ post.title }}</h2>
                <time class="text-sm text-gray-400 shrink-0">{{ post.created_at }}</time>
            </div>
            <p class="text-sm text-gray-500 mt-1 leading-relaxed">{{ post.summary }}</p>
        </a>
        {% endfor %}
        <div class="border-t border-gray-100"></div>
    </section>

</main>
{% endblock %}
